<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Frame border -->
  <rect x="0.5" y="0.5" width="15" height="15" rx="0.5" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.4"/>
  <!-- Corner accents -->
  <rect x="0" y="0" width="2" height="2" fill="currentColor" opacity="0.85"/>
  <rect x="14" y="0" width="2" height="2" fill="currentColor" opacity="0.85"/>
  <rect x="0" y="14" width="2" height="2" fill="currentColor" opacity="0.85"/>
  <rect x="14" y="14" width="2" height="2" fill="currentColor" opacity="0.85"/>

  <!-- < bracket -->
  <path d="M4 4 L2 6.5 L4 9" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- / slash -->
  <path d="M6.5 9 L5.5 4" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.75"/>
  <!-- > bracket -->
  <path d="M7 4 L9 6.5 L7 9" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Paper with dog-ear fold -->
  <path d="M10 2.5 L13 2.5 L14.5 4 L14.5 7.5 L10 7.5 Z" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="0.6"/>
  <path d="M13 2.5 L13 4 L14.5 4" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="0.4" opacity="0.6"/>
  <!-- Text lines on paper -->
  <line x1="11" y1="4.2" x2="13.5" y2="4.2" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>
  <line x1="11" y1="5.3" x2="13.5" y2="5.3" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>
  <line x1="11" y1="6.4" x2="12.5" y2="6.4" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>

  <!-- Circle -->
  <circle cx="12.25" cy="11.2" r="2.3" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="0.6"/>
  <!-- Checkmark in circle -->
  <path d="M10.8 11.2 L11.6 12.2 L13.7 9.8" fill="none" stroke="currentColor" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
