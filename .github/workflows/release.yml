# 버전 태그(v*) 푸시 시 자동 배포
# 사용법: git tag v1.0.1 && git push origin v1.0.1
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # package.json 버전을 태그에 맞춰 자동 갱신
      - name: Sync version from tag
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_REF#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # .vsix 빌드
      - name: Build VSIX
        run: npx @vscode/vsce package --no-yarn

      # VS Code Marketplace 배포 (이미 같은 버전이 있으면 스킵)
      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set +e
          OUT=$(npx @vscode/vsce publish --no-yarn -p "$VSCE_PAT" 2>&1)
          RC=$?
          echo "$OUT"
          if [ $RC -ne 0 ] && echo "$OUT" | grep -qi "already exists"; then
            echo "::notice::VS Code Marketplace already has this version — skipping"
            exit 0
          fi
          exit $RC

      # Open VSX 배포 (Cursor, VSCodium, code-server, Gitpod 등에서 사용 가능)
      # OVSX_PAT 시크릿이 없으면 자동 스킵, 같은 버전 존재 시에도 스킵
      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: |
          set +e
          OUT=$(npx ovsx publish "$(ls *.vsix)" -p "$OVSX_PAT" 2>&1)
          RC=$?
          echo "$OUT"
          if [ $RC -ne 0 ] && echo "$OUT" | grep -qi "already exists"; then
            echo "::notice::Open VSX already has this version — skipping"
            exit 0
          fi
          exit $RC

      # GitHub Release 생성 + .vsix 첨부 (이미 있으면 자산만 갱신)
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_REF: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_REF" >/dev/null 2>&1; then
            echo "::notice::Release $TAG_REF already exists — uploading assets"
            gh release upload "$TAG_REF" *.vsix --clobber
          else
            gh release create "$TAG_REF" *.vsix \
              --title "$TAG_REF" \
              --generate-notes
          fi
